name: Publish Microbots Release

on:
  push:
    branches: [main]
    paths:
      - VERSION
      - app/microbots-controller-debug.apk
      - firmware/firmware-manifest.json
      - firmware/microbots_codecell_c6_drive.bin
      - .github/workflows/release.yml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: version
        run: echo "tag=$(cat VERSION)" >> "$GITHUB_OUTPUT"
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release delete "$TAG" --cleanup-tag --yes || true
          gh release create "$TAG" \
            app/microbots-controller-debug.apk \
            firmware/firmware-manifest.json \
            firmware/microbots_codecell_c6_drive.bin \
            --title "$TAG" \
            --notes "Microbots Android controller and CodeCell C6 firmware $TAG"
