name: Publish Android APK Release

on:
  push:
    branches: [main]
    paths:
      - VERSION
      - app/microbots-controller-debug.apk
      - .github/workflows/release.yml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: version
        run: echo "tag=$(cat VERSION)" >> "$GITHUB_OUTPUT"
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release delete "$TAG" --cleanup-tag --yes || true
          gh release create "$TAG" app/microbots-controller-debug.apk \
            --title "$TAG" \
            --notes "Microbots Android controller $TAG"
